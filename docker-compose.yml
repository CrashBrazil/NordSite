version: "3.9"
services:
  nord_java:
    image: 192.168.3.2:5000/nord_site:15.0
    depends_on:
      - db_mysql 
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 2
        delay: 30s
        failure_action: rollback
        max_failure_ratio: 0
      rollback_config:
        parallelism: 2
        delay: 20s
        failure_action: continue
        max_failure_ratio: 0
    ports:
      - target: 8080
        published: 8080
        mode: ingress  
    configs:
      - source: application.properties
        target: /usr/app/config/application.properties
    secrets:
      - MYSQL_USER_ROOT
      - MYSQL_ROOT_PASSWORD
      - dburl
      - JWT_SECRET
    networks:
      - spring_mysql

  db_mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/MYSQL_ROOT_PASSWORD
      MYSQL_PASSWORD_FILE: /run/secrets/MYSQL_PASSWORD
      MYSQL_USER_FILE: /run/secrets/MYSQL_USER
      MYSQL_DATABASE: Nord
    secrets:
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_ROOT_PASSWORD
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 2
        delay: 30s
        failure_action: rollback
        max_failure_ratio: 0
      rollback_config:
        parallelism: 2
        delay: 20s
        failure_action: continue
        max_failure_ratio: 0
    ports:
      - "3307:3306"
    networks:
      - spring_mysql
    volumes:
      - mysql_dados:/var/lib/mysql

  nginx:
    image: nginx:1.29.5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role==manager
      restart_policy:
        condition: on-failure
        delay: 2s 
        max_attempts: 3 
        window: 60s 
      update_config:
        parallelism: 1 
        delay: 30s 
        failure_action: rollback
        max_failure_ratio: 0 
      rollback_config:
        parallelism: 1 
        delay: 20s 
        failure_action: continue
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
        - spring_mysql
    ports:
      - 9000:80
    restart: always

configs:
  application.properties:
    template_driver: golang
    file: ./src/main/resources/application.properties.tmpl
    name: nord.application.properties
volumes:
  mysql_dados:
networks:
  spring_mysql:
secrets:
  MYSQL_USER_ROOT:
    external: true
  MYSQL_PASSWORD:
    external: true
  JWT_SECRET:
    external: true
  MYSQL_USER:
    external: true
  MYSQL_ROOT_PASSWORD:
    external: true
  MYSQL_ROOT_HOST:
    external: true 
  dburl:
    external: true
