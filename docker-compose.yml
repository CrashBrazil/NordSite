version: "3.7"
services:
  nord_java:
    image: 192.168.3.2:5000/nord_site:2.0
    depends_on:
      - db_mysql 
    environment:
      MYSQL_HOST: db_mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_PORT: 3306
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 2
        delay: 30s
        failure_action: rollback
        max_failure_ratio: 0
      rollback_config:
        parallelism: 2
        delay: 20s
        failure_action: continue
        max_failure_ratio: 0
    ports:
      - target: 8080
        published: 8080
        mode: ingress  

    networks:
      - spring_mysql

  db_mysql:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Nord
      MYSQL_USER: CrashDocker
      MYSQL_PASSWORD: crashdocker
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 2
        delay: 30s
        failure_action: rollback
        max_failure_ratio: 0
      rollback_config:
        parallelism: 2
        delay: 20s
        failure_action: continue
        max_failure_ratio: 0
    ports:
      - "3307:3306"
    networks:
      - spring_mysql
    volumes:
      - mysql_dados:/var/lib/mysql

  nginx:
    image: nginx:1.29.5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role==manager
      restart_policy:
        condition: on-failure
        delay: 2s 
        max_attempts: 3 
        window: 60s 
      update_config:
        parallelism: 1 
        delay: 30s 
        failure_action: rollback
        max_failure_ratio: 0 
      rollback_config:
        parallelism: 1 
        delay: 20s 
        failure_action: continue
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
        - spring_mysql
    ports:
      - 9000:80
    restart: always
volumes:
  mysql_dados:
networks:
  spring_mysql:
